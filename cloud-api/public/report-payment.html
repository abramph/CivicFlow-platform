<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Report Payment | CivicFlow</title>
    <style>
      body { font-family: Arial, sans-serif; background: #f8fafc; color: #0f172a; margin: 0; padding: 24px; }
      .card { max-width: 560px; margin: 0 auto; background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; }
      h1 { margin-top: 0; font-size: 1.4rem; }
      label { display: block; margin: 12px 0 6px; font-weight: 600; }
      input, select, textarea, button { width: 100%; box-sizing: border-box; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 14px; }
      textarea { min-height: 90px; }
      button { margin-top: 16px; border: none; background: #16a34a; color: white; font-weight: 600; cursor: pointer; }
      button:disabled { opacity: 0.7; cursor: not-allowed; }
      .msg { margin-top: 12px; padding: 10px; border-radius: 8px; display: none; }
      .ok { background: #dcfce7; color: #14532d; border: 1px solid #86efac; }
      .err { background: #fee2e2; color: #7f1d1d; border: 1px solid #fca5a5; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Report a Payment</h1>
      <p>Submit your payment confirmation for admin review.</p>
      <form id="paymentForm">
        <input type="hidden" id="org_id" name="org_id" value="default-org" />
        <input type="hidden" id="member_id" name="member_id" value="" />

        <label for="member_name">Member Name</label>
        <input id="member_name" name="member_name" required />

        <label for="invoice_id">Invoice ID</label>
        <input id="invoice_id" name="invoice_id" type="text" required />

        <label for="method">Payment Method</label>
        <select id="method" name="method" required>
          <option value="">Select method</option>
          <option value="ZELLE">ZELLE</option>
          <option value="CASHAPP">CASHAPP</option>
          <option value="VENMO">VENMO</option>
          <option value="CASH">CASH</option>
        </select>

        <label for="amount">Amount</label>
        <input id="amount" name="amount" type="number" min="0.01" step="0.01" required />

        <label for="paid_date">Date Paid</label>
        <input id="paid_date" name="paid_date" type="date" required />

        <label for="note">Note</label>
        <textarea id="note" name="note"></textarea>

        <label for="screenshot">Screenshot</label>
        <input id="screenshot" name="screenshot" type="file" accept="image/*" />

        <button type="submit" id="submitBtn">Submit Payment Confirmation</button>
      </form>

      <div id="ok" class="msg ok"></div>
      <div id="err" class="msg err"></div>
    </div>

    <script>
      const form = document.getElementById('paymentForm');
      const ok = document.getElementById('ok');
      const err = document.getElementById('err');
      const submitBtn = document.getElementById('submitBtn');

      function firstNonEmpty(...values) {
        for (const value of values) {
          const normalized = String(value ?? '').trim();
          if (normalized) return normalized;
        }
        return '';
      }

      function getAllPrefillParams() {
        const all = new URLSearchParams(window.location.search || '');
        const hash = String(window.location.hash || '');
        if (hash) {
          const hashValue = hash.startsWith('#') ? hash.slice(1) : hash;
          const hashQueryIndex = hashValue.indexOf('?');
          const hashQuery = hashQueryIndex >= 0 ? hashValue.slice(hashQueryIndex + 1) : hashValue;
          const hashParams = new URLSearchParams(hashQuery);
          hashParams.forEach((value, key) => {
            if (!all.has(key)) all.set(key, value);
          });
        }
        return all;
      }

      function prefillFromQuery() {
        const params = getAllPrefillParams();
        const orgId = firstNonEmpty(params.get('org_id'), params.get('orgId'));
        const memberId = firstNonEmpty(params.get('member_id'), params.get('memberId'));
        const memberName = firstNonEmpty(params.get('member_name'), params.get('memberName'), params.get('member'), params.get('name'));
        const invoiceId = firstNonEmpty(params.get('invoice_id'), params.get('invoiceId'), params.get('invoice'), params.get('inv'));
        const amount = firstNonEmpty(params.get('amount'), params.get('amount_due'), params.get('amountDue'), params.get('amt'));
        const dueDate = firstNonEmpty(params.get('due_date'), params.get('dueDate'));
        const method = firstNonEmpty(params.get('method'));
        const note = firstNonEmpty(params.get('note'));

        if (orgId) document.getElementById('org_id').value = orgId;
        if (memberId && /^\d+$/.test(memberId)) document.getElementById('member_id').value = memberId;
        if (memberName) document.getElementById('member_name').value = memberName;

        if (invoiceId) {
          document.getElementById('invoice_id').value = invoiceId;
        }

        const amountNumber = Number(amount);
        if (Number.isFinite(amountNumber) && amountNumber > 0) {
          document.getElementById('amount').value = amountNumber.toFixed(2);
        }

        if (/^\d{4}-\d{2}-\d{2}$/.test(dueDate)) {
          document.getElementById('paid_date').value = dueDate;
        }

        if (method) {
          const methodValue = method.toUpperCase();
          const allowed = ['ZELLE', 'CASHAPP', 'VENMO', 'CASH'];
          if (allowed.includes(methodValue)) {
            document.getElementById('method').value = methodValue;
          }
        }

        if (note) {
          document.getElementById('note').value = note;
        }
      }

      prefillFromQuery();

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        ok.style.display = 'none';
        err.style.display = 'none';
        submitBtn.disabled = true;

        const formData = new FormData(form);
        const memberId = String(formData.get('member_id') || '').trim();
        const rawNote = String(formData.get('note') || '').trim();
        const noteWithMember = memberId
          ? (`[member_id:${memberId}] ${rawNote}`.trim())
          : rawNote;
        const payload = {
          org_id: String(formData.get('org_id') || 'default-org').trim(),
          invoice_id: String(formData.get('invoice_id') || '').trim(),
          member_name: String(formData.get('member_name') || '').trim(),
          method: String(formData.get('method') || '').trim(),
          amount: Number(formData.get('amount')),
          paid_date: String(formData.get('paid_date') || '').trim(),
          note: noteWithMember,
          screenshot_url: null,
        };

        try {
          const screenshotFile = formData.get('screenshot');
          if (screenshotFile && screenshotFile.size > 0) {
            const uploadForm = new FormData();
            uploadForm.append('screenshot', screenshotFile);
            const uploadResponse = await fetch('/api/payment-submissions/upload', {
              method: 'POST',
              body: uploadForm,
            });
            const uploadData = await uploadResponse.json();
            if (!uploadResponse.ok || uploadData.success === false || !uploadData.url) {
              throw new Error('Submission failed');
            }
            payload.screenshot_url = uploadData.url;
          }

          const response = await fetch('/api/payment-submissions', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify(payload),
          });
          if (!response.ok) throw new Error('Submission failed');

          form.reset();
          ok.textContent = 'Payment confirmation submitted successfully';
          ok.style.display = 'block';
        } catch (_e) {
          err.textContent = 'Submission failed';
          err.style.display = 'block';
        } finally {
          submitBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
